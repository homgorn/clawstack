services:
  clawstack:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - backend/.env
    ports:
      - "${CLAWSTACK_PORT:-8000}:8000"
    volumes:
      - ./backend/data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/health').read()"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
